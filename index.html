<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KillerWhalesResearcher</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #ffffff;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      height: 100%;
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid #ebebeb;
    }

    .logo-text {
      font-size: 13px;
      font-weight: 500;
      color: #111;
      letter-spacing: .01em;
    }

    .coin {
      position: fixed;
      z-index: 1;
      pointer-events: none;
      user-select: none;
    }

    .coin img {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <header>
    <span class="logo-text">killerwhalesresearcher</span>
  </header>

  <script>
    const BTC_IMG = 'https://cryptologos.cc/logos/bitcoin-btc-logo.png';
    const COUNT = 28;
    const coins = [];

    for (let i = 0; i < COUNT; i++) {
      const size = 48 + Math.random() * 56;
      const el = document.createElement('div');
      el.className = 'coin';
      el.style.width = size + 'px';
      el.style.height = size + 'px';

      const img = document.createElement('img');
      img.src = BTC_IMG;
      el.appendChild(img);
      document.body.appendChild(el);

      coins.push({
        el,
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        size,
        vx: (Math.random() - 0.5) * 0.6,
        vy: (Math.random() - 0.5) * 0.6,
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.008 + Math.random() * 0.012,
        alpha: 0.5 + Math.random() * 0.5,
      });

      el.style.opacity = coins[coins.length - 1].alpha;
    }

    function animate() {
      const W = window.innerWidth;
      const H = window.innerHeight;

      for (const c of coins) {
        c.wobble += c.wobbleSpeed;
        c.x += c.vx + Math.sin(c.wobble) * 0.25;
        c.y += c.vy + Math.cos(c.wobble) * 0.2;

        if (c.x < -c.size)  c.x = W + c.size;
        if (c.x > W + c.size) c.x = -c.size;
        if (c.y < -c.size)  c.y = H + c.size;
        if (c.y > H + c.size) c.y = -c.size;

        c.el.style.transform = `translate(${c.x - c.size/2}px, ${c.y - c.size/2}px)`;
      }

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
